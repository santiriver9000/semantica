<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santiago</title>
</head>
<body>
    <h1>Formulario de contacto</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Datos personales:</legend>
            <label for="nombre">Nombre:</label>
            <input id="nombre" name="nombre" type="text" required>
            <br> <br>
            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo" required>
            <br> <br>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="18" max="60" required>
        </fieldset>
        <fieldset>
            <legend>Género</legend>
            <input type="radio" id="f" name="genero" value="femenino">
            <label for="f">Femenino</label>
            <br> <br>
            <input type="radio" id="m" name="genero" value="masculino">
            <label for="m">Masculino</label>
            <br> <br>
            <input type="radio" id="o" name="genero" value="otro">
            <label for="o">Otro</label> 
        </fieldset>
        <fieldset>
            <legend>Tu opinión es importante para nosotros</legend>
            <label for="comentarios">Comentarios</label>
            <br>
            <textarea name="comentarios" id="comentarios" cols="30" rows="6"></textarea>
        </fieldset>
        <br>
        <button type="submit">Enviar</button>
        <button type="reset">Borrar</button>
    </form>
</body>
</html>
